name: セクター週次レポート生成

"on":
  # schedule:
  #   - cron: '0 11 * * 6'  # 毎週土曜 20:00 JST（市場クローズ後）
  workflow_dispatch:         # 手動実行（GitHub UI から）

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 初回全取得は最大6時間

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: bi/pipelines/requirements.txt

      - name: 依存ライブラリのインストール
        run: pip install -r bi/pipelines/requirements.txt

      - name: 価格キャッシュの復元
        uses: actions/cache@v4
        with:
          path: bi/data/raw/sector_prices.parquet
          key: sector-prices-${{ runner.os }}-${{ hashFiles('bi/data/universe/prime_list.csv') }}
          restore-keys: |
            sector-prices-${{ runner.os }}-

      - name: outputs / data ディレクトリの準備
        run: |
          mkdir -p bi/outputs
          mkdir -p bi/data/raw

      - name: セクターETL 実行
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: |
          set -o pipefail
          cd bi/pipelines
          python make_sector_report.py 2>&1 | tee /tmp/sector_etl.log

      - name: 出力ファイルをコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bi/outputs/sector_stock_weekly.parquet bi/outputs/sector_weekly.parquet
          if ! git diff --staged --quiet; then
            git commit -m "data: sector weekly $(date +'%Y-%m-%d')"
            git fetch origin master
            if ! git rebase origin/master; then
              git diff --name-only --diff-filter=U | xargs -I{} git checkout --theirs {}
              git diff --name-only --diff-filter=U | xargs git add
              git -c core.editor=true rebase --continue
            fi
            git push
          fi

      - name: Discord 通知（成功）
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          SECTORS=$(python3 -c "
          import pandas as pd
          df = pd.read_parquet('bi/outputs/sector_weekly.parquet')
          top = df.nlargest(3, 'Return_W01')[['Sector17CodeName','Return_W01']]
          lines = [f\"{r['Sector17CodeName']} {r['Return_W01']*100:.1f}%\" for _,r in top.iterrows()]
          print(' | '.join(lines))
          " 2>/dev/null || echo "集計失敗")
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"📊 セクター週次レポート完了\n$(date +'%Y-%m-%d') JST\n週次上位: ${SECTORS}\"}"

      - name: Discord 通知（失敗）
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ セクターETL失敗\n$(date +'%Y-%m-%d %H:%M') JST\nhttps://github.com/${{ github.repository }}/actions\"}"
