name: スクリーニングマスター更新

"on":
  schedule:
    - cron: '30 10 * * 1-5'  # 毎週月〜金 19:30 JST（UTC+9）
  workflow_dispatch:          # 手動実行ボタン（GitHub UI から即時実行可）

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: bi/pipelines/requirements.txt

      - name: 依存ライブラリのインストール
        run: pip install -r bi/pipelines/requirements.txt

      - name: outputs ディレクトリの準備
        run: mkdir -p bi/outputs

      - name: ETL 実行
        id: etl
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          PYTHONIOENCODING: utf-8
          YFINANCE_STATEMENT_FALLBACK: "1"
          MARGIN_INTEREST_LOOKBACK_WEEKS: "4"
          MARGIN_INTEREST_DAY_FALLBACK: "2"
          SHORT_SALE_LOOKBACK_DAYS: "30"
        run: |
          set -o pipefail
          cd bi/pipelines
          python make_screening_master_v2.py 2>&1 | tee /tmp/etl.log

          # サマリ抽出（Discord通知用）
          ROWS=$(grep -oP 'rows=\K[0-9]+' /tmp/etl.log | tail -1 || echo "?")
          YF=$(grep -oP 'yf_used=\K[0-9]+' /tmp/etl.log | tail -1 || echo "?")
          echo "rows=$ROWS"   >> $GITHUB_OUTPUT
          echo "yf_used=$YF" >> $GITHUB_OUTPUT

      - name: 出力ファイルをコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bi/outputs/
          git diff --staged --quiet \
            || git commit -m "data: screening master $(date +'%Y-%m-%d')" && git push

      - name: Discord 通知（成功）
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"✅ スクリーニング完了\n$(date +'%Y-%m-%d %H:%M') JST\n銘柄数: ${{ steps.etl.outputs.rows }}\nYF補完: ${{ steps.etl.outputs.yf_used }}銘柄\"}"

      - name: Discord 通知（失敗）
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ スクリーニング失敗\n$(date +'%Y-%m-%d %H:%M') JST\nログを確認: https://github.com/${{ github.repository }}/actions\"}"
