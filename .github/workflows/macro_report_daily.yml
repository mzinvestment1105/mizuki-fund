name: マクロレポート日次生成

# Claude API（ANTHROPIC_API_KEY）が使える状態になるまで、定期実行は停止。
# 再開するときは下の schedule のコメントを外す。
on:
  # schedule:
  #   - cron: '30 9 * * *'   # 09:30 UTC = 18:30 JST（東京市場引け後）
  workflow_dispatch:
    inputs:
      date:
        description: '対象日付 (YYYY-MM-DD, 空欄=今日)'
        required: false
        default: ''
      force:
        description: '新着なしでも強制生成 (true/false)'
        required: false
        default: 'false'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: bi/pipelines/requirements.txt

      - name: 依存ライブラリのインストール
        run: pip install -r bi/pipelines/requirements.txt

      # ── RSS取得（news_raw.md を最新化） ───────────────────────────────
      - name: RSS取得
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONIOENCODING: utf-8
          RSS_LOOKBACK_DAYS: "30"
        run: |
          cd bi/pipelines
          python fetch_rss.py --category all

      # ── マクロレポート生成 ────────────────────────────────────────────
      - name: マクロレポート生成
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: |
          cd bi/pipelines

          # 引数を組み立て
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="--date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          set +e
          python generate_macro_report.py $ARGS
          EXIT=$?
          set -e
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT

          # exit 2 (skip) は正常扱い、それ以外のエラーは伝播
          if [ $EXIT -ne 0 ] && [ $EXIT -ne 2 ]; then
            exit $EXIT
          fi

      # ── 新着なし → Discord に skip 通知 ─────────────────────────────
      - name: Skip 通知
        if: steps.generate.outputs.exit_code == '2'
        env:
          DISCORD_WEBHOOK_MACRO: ${{ secrets.DISCORD_WEBHOOK_MACRO }}
        run: |
          DATE=$(date +'%Y-%m-%d')
          curl -s -X POST "$DISCORD_WEBHOOK_MACRO" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"⏭️ **マクロレポートスキップ（${DATE}）**\\n新着RSSなし。昨日からの変化なし。\"}"

      # ── 生成成功 → コミット & Discord 送信 ──────────────────────────
      - name: コミット＆プッシュ
        if: steps.generate.outputs.exit_code == '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market/daily/
          if ! git diff --staged --quiet; then
            git commit -m "report: マクロレポート $(date +'%Y-%m-%d')"
            git fetch origin master
            if ! git rebase origin/master; then
              git diff --name-only --diff-filter=U | xargs -I{} git checkout --theirs {}
              git diff --name-only --diff-filter=U | xargs git add
              git -c core.editor=true rebase --continue
            fi
            git push
          fi

      - name: Discord 送信
        if: steps.generate.outputs.exit_code == '0'
        env:
          DISCORD_WEBHOOK_MACRO: ${{ secrets.DISCORD_WEBHOOK_MACRO }}
          PYTHONIOENCODING: utf-8
        run: |
          cd bi/pipelines
          python send_macro_discord.py

      # ── エラー時通知 ─────────────────────────────────────────────────
      - name: エラー通知
        if: failure()
        env:
          DISCORD_WEBHOOK_MACRO: ${{ secrets.DISCORD_WEBHOOK_MACRO }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_MACRO" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ **マクロレポート生成失敗**\\n$(date +'%Y-%m-%d %H:%M') JST\\nhttps://github.com/${{ github.repository }}/actions\"}"
