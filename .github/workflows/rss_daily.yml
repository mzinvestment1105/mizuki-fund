name: RSS日次ニュース取得

on:
  schedule:
    - cron: '0 22 * * 1-5'   # 毎週月〜金 07:00 JST（UTC+9）
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: bi/pipelines/requirements.txt

      - name: 依存ライブラリのインストール
        run: pip install -r bi/pipelines/requirements.txt

      - name: RSS取得
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: |
          cd bi/pipelines
          python fetch_rss.py --category all --days 1

      - name: 出力ファイルをコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market/daily/
          if ! git diff --staged --quiet; then
            git commit -m "data: RSS news $(date +'%Y-%m-%d')"
            git fetch origin master
            if ! git rebase origin/master; then
              git diff --name-only --diff-filter=U | xargs -I{} git checkout --theirs {}
              git diff --name-only --diff-filter=U | xargs git add
              git -c core.editor=true rebase --continue
            fi
            git push
          fi

      - name: Discord 通知（失敗時）
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ RSS取得失敗\n$(date +'%Y-%m-%d %H:%M') JST\nhttps://github.com/${{ github.repository }}/actions\"}"
