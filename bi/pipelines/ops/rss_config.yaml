# bi/pipelines/ops/rss_config.yaml
# RSS フィード設定 — マクロ経済・市場ニュース中心
#
# agent フィールド: どのエージェントが主に使うか（出力セクションの整理用）
#   macro_analyst  → market/daily/{date}_news_raw.md の「マクロ」セクション
#   sector_analyst → 同ファイルの「セクター・業界」セクション
#
# llm: haiku → ANTHROPIC_API_KEY がある環境でHaiku要約を付与。なければ生テキスト出力。
#
# fetch_rss.py: さかのぼり日数は --days または環境変数 RSS_LOOKBACK_DAYS（未指定時CLI既定は30日）。
#   フィードあたり件数: RSS_MAX_ITEMS_PER_FEED または min(35, 10+日数)。
#   新着だけ: python fetch_rss.py --new-only（.rss_seen.txt で重複除外）
#
# ※ TDnet（銘柄別適時開示）・Google News（銘柄名キーワード）は
#   fetch_tdnet_disclosures.py が担当（Deep Diveフロー）。本ファイルはマクロ専用。

feeds:

  # ── 日銀（金融政策変更トリガー）────────────────────────────────────
  boj:
    url: "https://www.boj.or.jp/rss/whatsnew.xml"
    category: macro
    agent: macro_analyst
    llm: haiku

  # ── 大和総研（日本経済予測・金融市場分析）──────────────────────────
  # Daiwa Institute of Research (dir.co.jp)
  # 機関投資家視点が無料で取れる唯一のソース
  daiwa_economics:
    url: "https://www.dir.co.jp/feed/economics.atom"
    category: macro
    agent: macro_analyst
    llm: haiku

  daiwa_capital_mkt:
    url: "https://www.dir.co.jp/feed/capital-mkt.atom"
    category: macro
    agent: macro_analyst
    llm: haiku

  # ── 市場ニュース全般（Yahoo ビジネス）──────────────────────────────
  yahoo_biz:
    url: "https://news.yahoo.co.jp/rss/topics/business.xml"
    category: market_news
    agent: macro_analyst
    llm: false
